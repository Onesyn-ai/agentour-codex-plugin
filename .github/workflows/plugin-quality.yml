name: Plugin quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate manifest and restart behavior
        run: python -m unittest tests.test_plugin
      - name: Compile plugin scripts
        run: python -m compileall -q plugins/agentour-compiler/scripts
